<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب العدالة الذكي</title>
    <style>
        :root { --dark: #000000; --silver: #c0c0c0; --accent: #111111; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--accent); padding: 20px; text-align: center; border-bottom: 2px solid var(--silver); }
        .header h1 { margin: 0; color: var(--silver); font-size: 1.4em; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #000; }
        .bubble { padding: 15px; border-radius: 12px; max-width: 80%; line-height: 1.6; }
        .ai { align-self: flex-start; background: #1a1a1a; border-right: 3px solid var(--silver); color: #ccc; }
        .user { align-self: flex-end; background: #fff; color: #000; font-weight: bold; }
        .pay-box { display: none; background: #1a1a1a; border: 1px solid var(--silver); padding: 15px; margin: 10px; border-radius: 10px; text-align: center; }
        .wa-btn { display: block; background: #25d366; color: white; padding: 12px; border-radius: 25px; text-decoration: none; margin-top: 10px; font-weight: bold; }
        .input-area { padding: 20px; background: #111; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 15px; border: 1px solid #444; border-radius: 30px; background: #000; color: white; outline: none; }
        button { background: var(--silver); color: black; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>⚖️ مكتب العدالة الذكي</h1></div>
    <div id="chat-window"><div class="bubble ai">مرحباً بك.. تفضل بطرح سؤالك القانوني وسأجيبك فوراً.</div></div>
    <div id="pay-box" class="pay-box">
        ✅ الرد القانوني جاهز. للحصول عليه، حول 150 ج.م لـ:
        <br><strong style="font-size: 1.3em; color: var(--silver);">01008293246</strong>
        <a href="https://wa.me/201008293246?text=تم%20التحويل" class="wa-btn">تأكيد التحويل (واتساب)</a>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسأل هنا...">
        <button onclick="askAI()">إرسال</button>
    </div>

<script>
    // مفتاح ربط جديد ومؤمن
    const K = "AIzaSyCNhRo9Hb0JJbEyoPhBFYtl2fQK4Zzkb6I";

    async function askAI() {
        const inp = document.getElementById('userInput');
        const win = document.getElementById('chat-window');
        const box = document.getElementById('pay-box');
        const txt = inp.value.trim();
        if(!txt) return;

        win.innerHTML += `<div class="bubble user">${txt}</div>`;
        inp.value = "";
        win.scrollTop = win.scrollHeight;

        try {
            // طريقة الربط المباشرة والمحسنة
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${K}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: "أنت محامي مصري خبير، أجب باختصار شديد جداً باللهجة المصرية ثم اطلب التحويل للرقم 01008293246. السؤال: " + txt }] }] })
            });
            const d = await r.json();
            const res = d.candidates[0].content.parts[0].text;
            win.innerHTML += `<div class="bubble ai">${res}</div>`;
            box.style.display = "block";
        } catch (e) {
            win.innerHTML += `<div class="bubble ai">يوجد تحديث في السيرفر حالياً، جرب مرة أخرى خلال دقيقة.</div>`;
        }
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
