<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب العدالة الذكي</title>
    <style>
        :root { --dark: #000; --gold: #c5a059; --gray: #111; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        .hero { justify-content: center; align-items: center; text-align: center; padding: 20px; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .hero h1 { color: var(--gold); font-size: 2.5em; margin-bottom: 10px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .start-btn { background: var(--gold); color: black; padding: 15px 45px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; font-size: 1.2em; transition: 0.3s; }
        .header { background: var(--gray); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #000; }
        .bubble { padding: 15px; border-radius: 12px; max-width: 85%; font-size: 16px; line-height: 1.6; }
        .ai { align-self: flex-start; background: #1a1a1a; border-right: 4px solid var(--gold); color: #ddd; }
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: bold; }
        .pay-box { display: none; background: #1a1500; border: 1px solid var(--gold); padding: 15px; margin: 10px; border-radius: 10px; text-align: center; }
        .wa-btn { display: block; background: #25d366; color: white; padding: 12px; border-radius: 25px; text-decoration: none; margin-top: 10px; font-weight: bold; }
        .input-area { padding: 15px; background: var(--gray); display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border: 1px solid #444; border-radius: 25px; background: #000; color: white; outline: none; }
        button { background: var(--gold); color: black; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="home" class="page active hero">
        <h1>⚖️ مكتب العدالة</h1>
        <p>مستشارك القانوني الذكي متاح الآن لخدمتك</p>
        <button class="start-btn" onclick="showChat()">ابدأ الاستشارة الآن</button>
    </div>
    <div id="chat-page" class="page">
        <div class="header"><h3>المحامي الذكي</h3></div>
        <div id="chat-window"><div class="bubble ai">مرحباً بك.. تفضل بطرح سؤالك القانوني.</div></div>
        <div id="pay-box" class="pay-box">
            ✅ الرد القانوني جاهز. للحصول عليه، حول 150 ج.م لـ:
            <br><strong style="font-size: 1.4em; color: var(--gold);">01008293246</strong>
            <a href="https://wa.me/201008293246?text=تم%20التحويل" class="wa-btn">تأكيد التحويل (واتساب)</a>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
            <button onclick="askAI()">إرسال</button>
        </div>
    </div>

<script>
    function showChat() {
        document.getElementById('home').classList.remove('active');
        document.getElementById('chat-page').classList.add('active');
    }

    // مفتاحك السليم اللي بعتهولي
    const API_KEY = "AIzaSyDD3QG1O-M4l0TwBGCvjGJRV4_KIR-y3Z0";

    async function askAI() {
        const inp = document.getElementById('userInput');
        const win = document.getElementById('chat-window');
        const box = document.getElementById('pay-box');
        const txt = inp.value.trim();
        if(!txt) return;

        win.innerHTML += `<div class="bubble user">${txt}</div>`;
        inp.value = "";
        win.scrollTop = win.scrollHeight;

        try {
            // التعديل السحري في الرابط (v1beta بدل v1)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: "أنت محامي مصري خبير، رد باختصار شديد باللهجة المصرية، ثم اطلب التحويل للرقم 01008293246. السؤال: " + txt }] }] })
            });
            const data = await res.json();
            
            if (data.candidates && data.candidates[0].content) {
                const aiText = data.candidates[0].content.parts[0].text;
                win.innerHTML += `<div class="bubble ai">${aiText}</div>`;
                box.style.display = "block";
            } else { throw new Error(); }
        } catch (e) {
            win.innerHTML += `<div class="bubble ai">جاري تفعيل السيرفر.. استنى ثواني وجرب تسأل تاني.</div>`;
        }
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
