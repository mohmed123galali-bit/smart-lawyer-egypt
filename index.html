<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب العدالة - النسخة الاحترافية</title>
    <style>
        :root { --gold: #c5a059; --dark: #000; --gray: #1a1a1a; --text: #fff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--gray); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); box-shadow: 0 2px 10px rgba(197, 160, 89, 0.2); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; }
        .bubble { padding: 15px; border-radius: 15px; max-width: 85%; position: relative; line-height: 1.6; font-size: 16px; }
        .user { align-self: flex-end; background: var(--gold); color: #000; font-weight: bold; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1a1a1a; border-right: 4px solid var(--gold); border-bottom-left-radius: 2px; }
        
        /* تأثير التغبيش */
        .locked { filter: blur(10px); user-select: none; pointer-events: none; transition: 0.5s; }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); border-radius: 10px; color: var(--gold); font-weight: bold; text-align: center; }

        /* منطقة الدفع */
        .payment-box { display: none; background: #111; padding: 15px; border-top: 2px solid var(--gold); text-align: center; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        .btn-pay { background: var(--gold); color: #000; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 95%; font-size: 16px; }
        
        /* منطقة الكتابة */
        .input-area { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 1px solid #333; }
        #userInput { flex: 1; padding: 12px; border-radius: 25px; background: #000; color: #fff; border: 1px solid #444; outline: none; }
        .btn-send { background: var(--gold); color: #000; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>⚖️ مكتب العدالة الذكي</h2>
    <small style="color: var(--gold);">استشارة قانونية فورية وموثقة</small>
</div>

<div id="chat-window">
    <div class="bubble ai">أهلاً بك في مكتب العدالة.. اطرح استشارتك وسأقدم لك "رأي مبدئي مجاني" ثم الرد القانوني الكامل بعد التأكد من جدية الطلب.</div>
</div>

<div id="payment-box" class="payment-box">
    <p style="color: var(--gold); margin-bottom: 5px;">🔒 الرد القانوني الكامل جاهز</p>
    <p style="font-size: 13px; margin-bottom: 10px;">حول <b>150 ج.م</b> لـ: <span style="font-size: 16px; font-weight: bold; color:var(--gold);">01008293246</span></p>
    <input type="text" id="userName" placeholder="اسمك الثلاثي للتسجيل">
    <input type="text" id="userPhone" placeholder="رقمك الذي حولت منه">
    <div style="font-size: 12px; color: #888; margin-bottom: 5px;">ارفع سكرين التحويل:</div>
    <input type="file" id="userFile" accept="image/*">
    <button class="btn-pay" onclick="sendToTelegram()">إرسال وتفعيل الإجابة 🚀</button>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="اكتب سؤالك القانوني هنا...">
    <button class="btn-send" onclick="askAI()">إرسال</button>
</div>

<script>
    // الإعدادات - حط بياناتك هنا
    const AI_KEY = "AIzaSyDBEisArZcxi-p6d9wfGSdBFBgWVB9IOUE";
    const TG_TOKEN = "هنا_حط_توكن_البوت"; 
    const CHAT_ID = "هنا_حط_رقم_حسابك";

    async function askAI() {
        const input = document.getElementById('userInput');
        const win = document.getElementById('chat-window');
        const userText = input.value.trim();
        if(!userText) return;

        win.innerHTML += `<div class="bubble user">${userText}</div>`;
        input.value = "";
        win.scrollTop = win.scrollHeight;

        try {
            const prompt = `أجب كمحامي مصري خبير. قسم ردك لجزئين مفصولين بكلمة (السر): 
            الجزء الأول: نبذة مجانية مختصرة جداً (سطر واحد) عن الرأي المبدئي.
            الجزء الثاني: الرد القانوني الشامل والمفصل بالمواد القانونية.
            السؤال هو: ${userText}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const fullReply = data.candidates[0].content.parts[0].text;
            
            // تقسيم الرد
            const parts = fullReply.split('السر');
            const preview = parts[0] || "تم تحليل طلبك بنجاح.";
            const hiddenContent = parts[1] || "التفاصيل القانونية جاهزة للعرض.";

            win.innerHTML += `
                <div class="bubble ai">
                    <div style="color:var(--gold); font-weight:bold; font-size:14px; margin-bottom:5px;">📋 الرأي المبدئي:</div>
                    <div>${preview}</div>
                    <hr style="border:0; border-top:1px dashed #444; margin:10px 0;">
                    <div style="position:relative;">
                        <div class="locked">${hiddenContent}</div>
                        <div class="lock-overlay">🔒 الرد التفصيلي محمي</div>
                    </div>
                </div>`;
            
            document.getElementById('payment-box').style.display = "block";
            win.scrollTop = win.scrollHeight;

        } catch (e) {
            win.innerHTML += `<div class="bubble ai">🔒 الرد جاهز، يرجى إرفاق إثبات الدفع لعرضه.</div>`;
            document.getElementById('payment-box').style.display = "block";
        }
    }

    async function sendToTelegram() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const fileInput = document.getElementById('userFile');
        const file = fileInput.files[0];

        if(!name || !phone || !file) { alert("من فضلك أكمل البيانات وارفع الصورة"); return; }

        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("photo", file);
        formData.append("caption", `🚨 طلب جديد في مكتب العدالة\n👤 الاسم: ${name}\n📱 الرقم: ${phone}\n💰 استشارة مدفوعة`);

        try {
            const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: "POST", body: formData });
            if(res.ok) { alert("تم الإرسال! سيتم مراجعة الدفع وفتح الإجابة لك فوراً."); }
        } catch (e) { alert("عطل في الاتصال بالتليجرام."); }
    }
</script>
</body>
</html>
