<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب العدالة - استشارات مجانية</title>
    <style>
        :root { --gold: #c5a059; --dark: #000; --gray: #1a1a1a; --text: #fff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--gray); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; }
        .bubble { padding: 15px; border-radius: 15px; max-width: 85%; line-height: 1.6; font-size: 16px; position: relative; }
        .user { align-self: flex-end; background: var(--gold); color: #000; font-weight: bold; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1a1a1a; border-right: 4px solid var(--gold); border-bottom-left-radius: 2px; white-space: pre-wrap; }
        
        .input-area { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 1px solid #333; }
        #userInput { flex: 1; padding: 12px; border-radius: 25px; background: #000; color: #fff; border: 1px solid #444; outline: none; }
        .btn-send { background: var(--gold); color: #000; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-send:hover { opacity: 0.8; }
        
        /* علامة التحميل (Loading) */
        .typing { font-size: 12px; color: var(--gold); margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="header">
    <h2>⚖️ مكتب العدالة الذكي</h2>
    <small style="color: var(--gold);">استشارة قانونية فورية مجانية (لفترة محدودة)</small>
</div>

<div id="chat-window">
    <div class="bubble ai">مرحباً بك في مكتب العدالة. أنا محاميك الآلي، كيف يمكنني مساعدتك في استشارتك القانونية اليوم؟</div>
</div>

<div id="typing-indicator" class="typing" style="padding-right: 20px;">⚖️ المحامي يكتب الآن...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="اكتب سؤالك القانوني هنا...">
    <button class="btn-send" onclick="askAI()">إرسال</button>
</div>

<script>
    const AI_KEY = "AIzaSyDBEisArZcxi-p6d9wfGSdBFBgWVB9IOUE"; // مفتاحك الحالي

    async function askAI() {
        const input = document.getElementById('userInput');
        const win = document.getElementById('chat-window');
        const loader = document.getElementById('typing-indicator');
        const userText = input.value.trim();
        
        if(!userText) return;

        // إظهار سؤال المستخدم
        win.innerHTML += `<div class="bubble user">${userText}</div>`;
        input.value = "";
        win.scrollTop = win.scrollHeight;

        // إظهار علامة التحميل
        loader.style.display = "block";

        try {
            const prompt = `أنت محامي مصري خبير جداً. أجب بوضوح وتفصيل على السؤال التالي بلهجة قانونية مصرية سليمة، واذكر المواد القانونية إن أمكن: ${userText}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            loader.style.display = "none";

            if (data.candidates && data.candidates[0].content) {
                const reply = data.candidates[0].content.parts[0].text;
                win.innerHTML += `<div class="bubble ai">${reply}</div>`;
            } else {
                throw new Error();
            }

        } catch (e) {
            loader.style.display = "none";
            win.innerHTML += `<div class="bubble ai">عذراً، المحامي منشغل حالياً، يرجى المحاولة مرة أخرى بعد قليل.</div>`;
        }
        win.scrollTop = win.scrollHeight;
    }

    // السماح بالإرسال عند الضغط على Enter
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') askAI();
    });
</script>
</body>
</html>
