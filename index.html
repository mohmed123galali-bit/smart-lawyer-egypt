<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب العدالة الذكي</title>
    <style>
        :root { --primary: #001f3f; --gold: #d4af37; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: white; margin: 10px; border-radius: 15px; }
        .bubble { padding: 12px 18px; border-radius: 15px; max-width: 80%; font-size: 16px; line-height: 1.6; position: relative; }
        .ai { align-self: flex-start; background: #e8ecef; border-right: 5px solid var(--gold); color: #333; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-left: 5px solid var(--gold); }
        .payment-box { display: none; background: #fff3cd; border: 2px dashed #856404; padding: 15px; margin: 10px; border-radius: 10px; text-align: center; animation: fadeIn 0.5s; }
        .whatsapp-btn { display: block; background: #25d366; color: white; padding: 12px; border-radius: 30px; text-decoration: none; margin-top: 10px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .whatsapp-btn:hover { background: #128c7e; transform: scale(1.05); }
        .input-area { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 30px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header"><h1>⚖️ مكتب العدالة الذكي</h1></div>
    <div id="chat-window">
        <div class="bubble ai">مرحباً بك في مكتب العدالة.. أنا مستشارك القانوني الذكي. تفضل بطرح سؤالك وسأقوم بالرد عليك فوراً.</div>
    </div>
    <div id="payment-notice" class="payment-box">
        ⚠️ تم تجهيز الرد القانوني التفصيلي. لإرسال المذكرة الكاملة، يرجى تحويل مبلغ <strong>150 ج.م</strong> لـ:
        <br><strong style="font-size: 1.4em; color: #000;">01008293246</strong>
        <a href="https://wa.me/201008293246?text=تم%20التحويل%20بمبلغ%20150%20جنيه" class="whatsapp-btn">إرسال إيصال التحويل (واتساب) ✅</a>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسأل سؤالك القانوني هنا...">
        <button onclick="askAI()">إرسال</button>
    </div>

<script>
    // مفتاح الربط الجديد (تم تصحيحه وتفعيله)
    const API_KEY = "AIzaSyCNhRo9Hb0JJbEyoPhBFYtl2fQK4Zzkb6I"; 
    
    async function askAI() {
        const input = document.getElementById('userInput');
        const windowChat = document.getElementById('chat-window');
        const payNotice = document.getElementById('payment-notice');
        const text = input.value.trim();
        
        if (!text) return;

        windowChat.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = "";
        windowChat.scrollTop = windowChat.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "أنت محامي مصري خبير. قدم نصيحة قانونية مختصرة جداً وباللهجة المصرية المحترمة، ثم اطلب التحويل لـ 01008293246. السؤال: " + text }] }] })
            });
            const data = await res.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            windowChat.innerHTML += `<div class="bubble ai">${aiText}</div>`;
            payNotice.style.display = "block";
            windowChat.scrollTop = windowChat.scrollHeight;
        } catch (e) {
            windowChat.innerHTML += `<div class="bubble ai">عذراً، يرجى تحديث الصفحة والمحاولة مرة أخرى.</div>`;
        }
    }
</script>
</body>
</html>
