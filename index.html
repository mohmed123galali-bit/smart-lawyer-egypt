<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب العدالة الذكي</title>
    <style>
        :root { --primary: #001f3f; --gold: #d4af37; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 16px; }
        .ai { align-self: flex-start; background: #e8ecef; border-right: 5px solid var(--gold); }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        .payment-box { display: none; background: #fff3cd; border: 2px dashed #856404; padding: 15px; margin: 10px; border-radius: 10px; text-align: center; }
        .whatsapp-btn { display: block; background: #25d366; color: white; padding: 10px; border-radius: 25px; text-decoration: none; margin-top: 10px; font-weight: bold; }
        .input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; }
        button { background: var(--gold); color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>⚖️ مكتب العدالة الذكي</h1></div>
    <div id="chat-window"><div class="bubble ai">مرحباً بك.. اسأل سؤالك القانوني الآن.</div></div>
    <div id="payment-notice" class="payment-box">
        ⚠️ تم تجهيز الرد الكامل. لتحميل المستند، حول 150 ج.م لـ:
        <br><strong style="font-size: 1.2em;">01008293246</strong>
        <a href="https://wa.me/201008293246?text=تم%20التحويل%20بمبلغ%20150%20جنيه" class="whatsapp-btn">إرسال إيصال التحويل (واتساب) ✅</a>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسأل هنا...">
        <button onclick="askAI()">إرسال</button>
    </div>
<script>
    const KEY = "AIzaSyCNhRo9Hb0JJbEyoPhBFYtl2fQK4Zzkb6I"; 
    async function askAI() {
        const input = document.getElementById('userInput');
        const windowChat = document.getElementById('chat-window');
        const payNotice = document.getElementById('payment-notice');
        if (!input.value.trim()) return;
        windowChat.innerHTML += `<div class="bubble user">${input.value}</div>`;
        const text = input.value; input.value = "";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: "أنت محامي مصري. رد باختصار ثم اطلب 150ج على 01008293246. السؤال: " + text }] }] })
            });
            const data = await res.json();
            windowChat.innerHTML += `<div class="bubble ai">${data.candidates[0].content.parts[0].text}</div>`;
            payNotice.style.display = "block";
            windowChat.scrollTop = windowChat.scrollHeight;
        } catch (e) { windowChat.innerHTML += `<div class="bubble ai">حدث خطأ.. حاول مجدداً.</div>`; }
    }
</script>
</body>
</html>
