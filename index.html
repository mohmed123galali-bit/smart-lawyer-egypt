<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب العدالة - النظام الذكي</title>
    <style>
        :root { --gold: #c5a059; --dark: #000; --gray: #1a1a1a; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--gray); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #0a0a0a; }
        .bubble { padding: 15px; border-radius: 15px; max-width: 85%; position: relative; line-height: 1.6; }
        .user { align-self: flex-end; background: var(--gold); color: #000; font-weight: bold; }
        .ai { align-self: flex-start; background: #222; border-right: 4px solid var(--gold); }
        
        /* نظام التغبيش */
        .locked { filter: blur(12px); user-select: none; pointer-events: none; }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); border-radius: 15px; color: var(--gold); font-weight: bold; }

        .payment-box { display: none; background: #111; padding: 20px; border-top: 2px solid var(--gold); text-align: center; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; text-align: center; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 95%; font-size: 16px; }
        .input-area { padding: 15px; background: #111; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2>⚖️ مكتب العدالة الذكي</h2>
    <small style="color: #888;">نظام الاستشارات الآلي المؤمن</small>
</div>

<div id="chat-window">
    <div class="bubble ai">أهلاً بك.. اطرح استشارتك القانونية وسأقوم بتحليلها فوراً بالذكاء الاصطناعي.</div>
</div>

<div id="payment-box" class="payment-box">
    <p style="color: var(--gold);">🔒 الرد القانوني جاهز. لفتح التشفير:</p>
    <p style="font-size: 14px;">حول <b>150 ج.م</b> لـ: <span style="font-size: 18px; font-weight: bold;">01008293246</span></p>
    <input type="text" id="userName" placeholder="اسمك الثلاثي للتسجيل">
    <input type="text" id="userPhone" placeholder="رقم الموبايل اللي حولت منه">
    <input type="file" id="userFile" accept="image/*">
    <button class="btn" onclick="sendToTelegram()">إرسال إثبات الدفع لفك التشفير 🚀</button>
</div>

<div class="input-area">
    <input type="text" id="userInput" style="flex:1" placeholder="اكتب سؤالك القانوني هنا...">
    <button class="btn" style="width:auto" onclick="askAI()">إرسال</button>
</div>

<script>
    const AI_KEY = "AIzaSyDBEisArZcxi-p6d9wfGSdBFBgWVB9IOUE";
    const TG_TOKEN = "حط_هنا_توكن_البوت"; 
    const CHAT_ID = "حط_هنا_رقم_حسابك";

    async function askAI() {
        const input = document.getElementById('userInput');
        const win = document.getElementById('chat-window');
        const text = input.value.trim();
        if(!text) return;

        win.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = "";
        win.scrollTop = win.scrollHeight;

        try {
            // نظام التأكد من جوجل (منع الأعطال)
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "أنت محامي مصري خبير، أجب بدقة واختصار شديد جداً بلهجة قانونية مصرية على هذا السؤال فقط: " + text }] }]
                })
            });

            const data = await res.json();
            if(data.candidates && data.candidates[0].content) {
                const reply = data.candidates[0].content.parts[0].text;
                win.innerHTML += `
                    <div class="bubble ai">
                        <div class="locked">${reply}</div>
                        <div class="lock-overlay">🔒 اضغط بالأسفل لفتح الرد</div>
                    </div>`;
                document.getElementById('payment-box').style.display = "block";
            } else { throw new Error(); }

        } catch (e) {
            // رسالة الأمان لو جوجل هنجت
            win.innerHTML += `<div class="bubble ai">🔒 تم استلام طلبك وبانتظار المراجعة القانونية.. يرجى إرفاق إثبات الدفع بالأسفل.</div>`;
            document.getElementById('payment-box').style.display = "block";
        }
        win.scrollTop = win.scrollHeight;
    }

    async function sendToTelegram() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const file = document.getElementById('userFile').files[0];

        if(!name || !phone || !file) { alert("أكمل البيانات وارفع الصورة أولاً!"); return; }

        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("photo", file);
        formData.append("caption", `⚖️ إثبات دفع جديد\n👤 الاسم: ${name}\n📱 الرقم: ${phone}\n💰 المبلغ: 150ج`);

        const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: "POST", body: formData });
        if(res.ok) {
            alert("وصلت الرسالة! سيتم مراجعة اسمك وتفعيل الرد فوراً.");
        }
    }
</script>
</body>
</html>
